name: bootstrap-gh-bind

on:
    workflow_dispatch:
        inputs:
            app_slug:
                description: "Application slug, e.g. todo-list"
                required: true
                type: string
            aws_region:
                description: "Optional region override (defaults to AWS_REGION variable)"
                required: false
                type: string
                default: ""
    workflow_call:
        inputs:
            app_slug:
                required: true
                type: string
            aws_region:
                required: false
                type: string
                default: ""
        secrets:
            GH_APP_ID:
                required: true
            GH_APP_PRIVATE_KEY:
                required: true

permissions:
    id-token: write
    contents: read

jobs:
    bootstrap-gh-bind:
        runs-on: ubuntu-latest

        steps:
            - name: Guard template source repository
              shell: bash
              run: |
                  set -euo pipefail
                  if [[ "${GITHUB_REPOSITORY}" == "KnightRadiants/solid-fullstack-template" ]]; then
                    echo "::error::This workflow is blocked on template source repository (KnightRadiants/solid-fullstack-template). Use a repository created from this template."
                    exit 1
                  fi

            - name: Checkout
              uses: actions/checkout@v4

            - name: Validate GitHub App secrets
              shell: bash
              env:
                  GH_APP_ID: ${{ secrets.GH_APP_ID }}
                  GH_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}
              run: |
                  set -euo pipefail
                  if [[ -z "${GH_APP_ID}" || -z "${GH_APP_PRIVATE_KEY}" ]]; then
                    echo "::error::Missing required secrets GH_APP_ID or GH_APP_PRIVATE_KEY."
                    exit 1
                  fi

            - name: Resolve repository name
              id: repo
              shell: bash
              run: |
                  set -euo pipefail
                  echo "name=${GITHUB_REPOSITORY#*/}" >> "$GITHUB_OUTPUT"

            - name: Create GitHub App installation token
              id: app-token
              uses: actions/create-github-app-token@v2
              with:
                  app-id: ${{ secrets.GH_APP_ID }}
                  private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
                  owner: ${{ github.repository_owner }}
                  repositories: ${{ steps.repo.outputs.name }}

            - name: Resolve workflow configuration
              id: cfg
              shell: bash
              env:
                  INPUT_AWS_REGION: ${{ inputs.aws_region }}
                  VAR_AWS_REGION: ${{ vars.AWS_REGION }}
                  VAR_AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
                  VAR_BOOTSTRAP_ROLE_NAME: ${{ vars.BOOTSTRAP_ROLE_NAME }}
                  VAR_AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}
                  VAR_TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
                  VAR_TF_LOCK_TABLE: ${{ vars.TF_LOCK_TABLE }}
                  VAR_TF_STATE_KEY_PREFIX: ${{ vars.TF_STATE_KEY_PREFIX }}
              run: |
                  set -euo pipefail

                  AWS_REGION="${INPUT_AWS_REGION:-$VAR_AWS_REGION}"
                  if [[ -z "${AWS_REGION}" ]]; then
                    echo "::error::AWS region is missing. Set workflow input aws_region or repository/org variable AWS_REGION."
                    exit 1
                  fi

                  if [[ -z "${VAR_TF_STATE_BUCKET}" ]]; then
                    echo "::error::Missing variable TF_STATE_BUCKET."
                    exit 1
                  fi

                  if [[ -z "${VAR_TF_LOCK_TABLE}" ]]; then
                    echo "::error::Missing variable TF_LOCK_TABLE."
                    exit 1
                  fi

                  if [[ -n "${VAR_AWS_ROLE_TO_ASSUME}" ]]; then
                    ROLE_ARN="${VAR_AWS_ROLE_TO_ASSUME}"
                  else
                    if [[ -z "${VAR_AWS_ACCOUNT_ID}" || -z "${VAR_BOOTSTRAP_ROLE_NAME}" ]]; then
                      echo "::error::Set AWS_ROLE_TO_ASSUME or both AWS_ACCOUNT_ID and BOOTSTRAP_ROLE_NAME."
                      exit 1
                    fi
                    ROLE_ARN="arn:aws:iam::${VAR_AWS_ACCOUNT_ID}:role/${VAR_BOOTSTRAP_ROLE_NAME}"
                  fi

                  STATE_PREFIX="${VAR_TF_STATE_KEY_PREFIX:-bootstrap-org}"
                  STATE_PREFIX="${STATE_PREFIX#/}"
                  STATE_PREFIX="${STATE_PREFIX%/}"
                  STATE_KEY="${STATE_PREFIX}/${{ inputs.app_slug }}.tfstate"

                  echo "aws_region=${AWS_REGION}" >> "$GITHUB_OUTPUT"
                  echo "role_arn=${ROLE_ARN}" >> "$GITHUB_OUTPUT"
                  echo "tf_state_bucket=${VAR_TF_STATE_BUCKET}" >> "$GITHUB_OUTPUT"
                  echo "tf_lock_table=${VAR_TF_LOCK_TABLE}" >> "$GITHUB_OUTPUT"
                  echo "state_key=${STATE_KEY}" >> "$GITHUB_OUTPUT"

            - name: Configure AWS credentials (OIDC)
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  role-to-assume: ${{ steps.cfg.outputs.role_arn }}
                  aws-region: ${{ steps.cfg.outputs.aws_region }}

            - name: Preflight backend resources
              shell: bash
              env:
                  AWS_REGION: ${{ steps.cfg.outputs.aws_region }}
                  TF_STATE_BUCKET: ${{ steps.cfg.outputs.tf_state_bucket }}
                  TF_LOCK_TABLE: ${{ steps.cfg.outputs.tf_lock_table }}
              run: |
                  set -euo pipefail

                  if ! aws s3api head-bucket --bucket "$TF_STATE_BUCKET" 2>/dev/null; then
                    echo "::error::S3 backend bucket '$TF_STATE_BUCKET' does not exist or is not accessible."
                    exit 1
                  fi

                  if ! aws dynamodb describe-table --table-name "$TF_LOCK_TABLE" --region "$AWS_REGION" >/dev/null 2>&1; then
                    echo "::error::DynamoDB lock table '$TF_LOCK_TABLE' does not exist or is not accessible."
                    exit 1
                  fi

            - name: Setup Terraform
              uses: hashicorp/setup-terraform@v3

            - name: Read account targets from bootstrap-org state
              id: targets
              shell: bash
              env:
                  AWS_REGION: ${{ steps.cfg.outputs.aws_region }}
                  TF_STATE_BUCKET: ${{ steps.cfg.outputs.tf_state_bucket }}
                  TF_LOCK_TABLE: ${{ steps.cfg.outputs.tf_lock_table }}
                  STATE_KEY: ${{ steps.cfg.outputs.state_key }}
              run: |
                  set -euo pipefail

                  terraform -chdir=terraform/bootstrap-org init \
                    -backend-config="bucket=${TF_STATE_BUCKET}" \
                    -backend-config="key=${STATE_KEY}" \
                    -backend-config="region=${AWS_REGION}" \
                    -backend-config="dynamodb_table=${TF_LOCK_TABLE}" \
                    -backend-config="encrypt=true" \
                    -reconfigure

                  OUTPUTS_JSON="$(terraform -chdir=terraform/bootstrap-org output -json)"
                  ACCOUNT_IDS_JSON="$(jq -c '.account_ids.value // {}' <<< "${OUTPUTS_JSON}")"

                  if [[ "${ACCOUNT_IDS_JSON}" == "{}" ]]; then
                    echo "::error::No output account_ids found in bootstrap-org state (${STATE_KEY}). Run bootstrap-org apply once for this app_slug to refresh outputs."
                    exit 1
                  fi

                  if ! jq -e 'type=="object" and length>0 and all(.[]; (type=="string" or type=="number"))' <<< "${ACCOUNT_IDS_JSON}" >/dev/null; then
                    echo "::error::Invalid account_ids output shape."
                    exit 1
                  fi

                  echo "account_ids_json=${ACCOUNT_IDS_JSON}" >> "$GITHUB_OUTPUT"

            - name: Bind AWS role variables to GitHub Environments
              uses: actions/github-script@v7
              env:
                  ACCOUNT_IDS_JSON: ${{ steps.targets.outputs.account_ids_json }}
                  AWS_REGION: ${{ steps.cfg.outputs.aws_region }}
              with:
                  github-token: ${{ steps.app-token.outputs.token }}
                  script: |
                      const accountIds = JSON.parse(process.env.ACCOUNT_IDS_JSON || "{}");
                      const [owner, repo] = process.env.GITHUB_REPOSITORY.split("/");
                      const awsRegion = process.env.AWS_REGION;
                      const roleName = "gha-environment-deploy";
                      const summary = [];

                      async function upsertEnvironmentVariable(environmentName, name, value) {
                        try {
                          await github.request("PATCH /repos/{owner}/{repo}/environments/{environment_name}/variables/{name}", {
                            owner,
                            repo,
                            environment_name: environmentName,
                            name,
                            value,
                          });
                        } catch (error) {
                          if (error.status !== 404) {
                            throw error;
                          }

                          await github.request("POST /repos/{owner}/{repo}/environments/{environment_name}/variables", {
                            owner,
                            repo,
                            environment_name: environmentName,
                            name,
                            value,
                          });
                        }
                      }

                      for (const [environmentNameRaw, accountIdRaw] of Object.entries(accountIds)) {
                        const environmentName = String(environmentNameRaw).toLowerCase();
                        const accountId = String(accountIdRaw);
                        const roleArn = `arn:aws:iam::${accountId}:role/${roleName}`;

                        await github.request("PUT /repos/{owner}/{repo}/environments/{environment_name}", {
                          owner,
                          repo,
                          environment_name: environmentName,
                        });

                        await upsertEnvironmentVariable(environmentName, "AWS_ROLE_TO_ASSUME", roleArn);
                        await upsertEnvironmentVariable(environmentName, "AWS_REGION", awsRegion);

                        summary.push(`${environmentName}: AWS_ROLE_TO_ASSUME + AWS_REGION`);
                      }

                      core.summary
                        .addHeading("bootstrap-gh-bind")
                        .addList(summary)
                        .write();
