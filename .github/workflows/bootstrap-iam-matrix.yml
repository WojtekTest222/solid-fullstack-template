name: bootstrap-iam-matrix

on:
    workflow_dispatch:
        inputs:
            app_slug:
                description: "Application slug, e.g. todo-list"
                required: true
                type: string
            environments:
                description: "Optional comma-separated environment filter, e.g. prod,dev,preview"
                required: false
                type: string
                default: ""
            aws_region:
                description: "Optional region override (defaults to AWS_REGION variable)"
                required: false
                type: string
                default: ""
    workflow_call:
        inputs:
            app_slug:
                required: true
                type: string
            environments:
                required: false
                type: string
                default: ""
            aws_region:
                required: false
                type: string
                default: ""

permissions:
    id-token: write
    contents: read

jobs:
    resolve-targets:
        runs-on: ubuntu-latest
        outputs:
            matrix_json: ${{ steps.targets.outputs.matrix_json }}
            aws_region: ${{ steps.cfg.outputs.aws_region }}

        steps:
            - name: Guard template source repository
              shell: bash
              run: |
                  set -euo pipefail
                  if [[ "${GITHUB_REPOSITORY}" == "KnightRadiants/solid-fullstack-template" ]]; then
                    echo "::error::This workflow is blocked on template source repository (KnightRadiants/solid-fullstack-template). Use a repository created from this template."
                    exit 1
                  fi

            - name: Checkout
              uses: actions/checkout@v4

            - name: Resolve workflow configuration
              id: cfg
              shell: bash
              env:
                  INPUT_AWS_REGION: ${{ inputs.aws_region }}
                  VAR_AWS_REGION: ${{ vars.AWS_REGION }}
                  VAR_AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
                  VAR_BOOTSTRAP_ROLE_NAME: ${{ vars.BOOTSTRAP_ROLE_NAME }}
                  VAR_AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}
                  VAR_TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
              run: |
                  set -euo pipefail

                  AWS_REGION="${INPUT_AWS_REGION:-$VAR_AWS_REGION}"
                  if [[ -z "${AWS_REGION}" ]]; then
                    echo "::error::AWS region is missing. Set workflow input aws_region or repository/org variable AWS_REGION."
                    exit 1
                  fi

                  if [[ -z "${VAR_TF_STATE_BUCKET}" ]]; then
                    echo "::error::Missing variable TF_STATE_BUCKET."
                    exit 1
                  fi

                  if [[ -n "${VAR_AWS_ROLE_TO_ASSUME}" ]]; then
                    ROLE_ARN="${VAR_AWS_ROLE_TO_ASSUME}"
                  else
                    if [[ -z "${VAR_AWS_ACCOUNT_ID}" || -z "${VAR_BOOTSTRAP_ROLE_NAME}" ]]; then
                      echo "::error::Set AWS_ROLE_TO_ASSUME or both AWS_ACCOUNT_ID and BOOTSTRAP_ROLE_NAME."
                      exit 1
                    fi
                    ROLE_ARN="arn:aws:iam::${VAR_AWS_ACCOUNT_ID}:role/${VAR_BOOTSTRAP_ROLE_NAME}"
                  fi

                  TF_LOCK_TABLE="terraform-locks"
                  STATE_PREFIX="bootstrap-org"
                  STATE_KEY="${STATE_PREFIX}/${{ inputs.app_slug }}.tfstate"

                  echo "aws_region=${AWS_REGION}" >> "$GITHUB_OUTPUT"
                  echo "role_arn=${ROLE_ARN}" >> "$GITHUB_OUTPUT"
                  echo "tf_state_bucket=${VAR_TF_STATE_BUCKET}" >> "$GITHUB_OUTPUT"
                  echo "tf_lock_table=${TF_LOCK_TABLE}" >> "$GITHUB_OUTPUT"
                  echo "state_key=${STATE_KEY}" >> "$GITHUB_OUTPUT"

            - name: Configure AWS credentials (OIDC)
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  role-to-assume: ${{ steps.cfg.outputs.role_arn }}
                  aws-region: ${{ steps.cfg.outputs.aws_region }}

            - name: Preflight backend resources
              shell: bash
              env:
                  AWS_REGION: ${{ steps.cfg.outputs.aws_region }}
                  TF_STATE_BUCKET: ${{ steps.cfg.outputs.tf_state_bucket }}
                  TF_LOCK_TABLE: ${{ steps.cfg.outputs.tf_lock_table }}
              run: |
                  set -euo pipefail

                  if ! aws s3api head-bucket --bucket "$TF_STATE_BUCKET" 2>/dev/null; then
                    echo "::error::S3 backend bucket '$TF_STATE_BUCKET' does not exist or is not accessible."
                    exit 1
                  fi

                  if ! aws dynamodb describe-table --table-name "$TF_LOCK_TABLE" --region "$AWS_REGION" >/dev/null 2>&1; then
                    echo "::error::DynamoDB lock table '$TF_LOCK_TABLE' does not exist or is not accessible."
                    exit 1
                  fi

            - name: Setup Terraform
              uses: hashicorp/setup-terraform@v3

            - name: Read account targets from bootstrap-org state
              id: targets
              shell: bash
              env:
                  AWS_REGION: ${{ steps.cfg.outputs.aws_region }}
                  TF_STATE_BUCKET: ${{ steps.cfg.outputs.tf_state_bucket }}
                  TF_LOCK_TABLE: ${{ steps.cfg.outputs.tf_lock_table }}
                  STATE_KEY: ${{ steps.cfg.outputs.state_key }}
                  ENVIRONMENTS_RAW: ${{ inputs.environments }}
              run: |
                  set -euo pipefail

                  terraform -chdir=terraform/bootstrap-org init \
                    -backend-config="bucket=${TF_STATE_BUCKET}" \
                    -backend-config="key=${STATE_KEY}" \
                    -backend-config="region=${AWS_REGION}" \
                    -backend-config="dynamodb_table=${TF_LOCK_TABLE}" \
                    -backend-config="encrypt=true" \
                    -reconfigure

                  OUTPUTS_JSON="$(terraform -chdir=terraform/bootstrap-org output -json)"
                  ACCOUNT_IDS_JSON="$(jq -c '.account_ids.value // {}' <<< "${OUTPUTS_JSON}")"
                  if [[ "${ACCOUNT_IDS_JSON}" == "{}" ]]; then
                    echo "::error::No output account_ids found in bootstrap-org state (${STATE_KEY}). Run bootstrap-org apply once for this app_slug to refresh outputs."
                    exit 1
                  fi

                  FILTERS_JSON="[]"
                  if [[ -n "${ENVIRONMENTS_RAW}" ]]; then
                    FILTERS_JSON="$(echo "${ENVIRONMENTS_RAW}" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | tr '[:upper:]' '[:lower:]' | awk 'NF' | jq -R . | jq -sc .)"
                  fi

                  TARGETS_JSON="$(jq -c --argjson filters "${FILTERS_JSON}" '
                    to_entries
                    | map({ environment_name: (.key | ascii_downcase), target_account_id: (.value | tostring) })
                    | if ($filters | length) > 0
                      then map(select(.environment_name as $env | ($filters | index($env))))
                      else .
                      end
                    | sort_by(.environment_name)
                  ' <<< "${ACCOUNT_IDS_JSON}")"

                  if [[ "${TARGETS_JSON}" == "[]" ]]; then
                    echo "::error::Environment filter produced empty target list."
                    exit 1
                  fi

                  echo "matrix_json=${TARGETS_JSON}" >> "$GITHUB_OUTPUT"

            - name: Print matrix targets
              shell: bash
              env:
                  MATRIX_JSON: ${{ steps.targets.outputs.matrix_json }}
              run: |
                  set -euo pipefail
                  echo "${MATRIX_JSON}" | jq .

    bootstrap-iam:
        needs: resolve-targets
        strategy:
            fail-fast: false
            matrix:
                include: ${{ fromJSON(needs.resolve-targets.outputs.matrix_json) }}

        uses: ./.github/workflows/bootstrap-iam.yml
        with:
            app_slug: ${{ inputs.app_slug }}
            environment_name: ${{ matrix.environment_name }}
            target_account_id: ${{ matrix.target_account_id }}
            aws_region: ${{ needs.resolve-targets.outputs.aws_region }}
        secrets: inherit
