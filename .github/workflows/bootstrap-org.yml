name: bootstrap-org

on:
    workflow_dispatch:
        inputs:
            app_slug:
                description: "Application slug, e.g. todo-list"
                required: true
                type: string
            root_email_base:
                description: "Base root email without plus alias, e.g. owner@example.com"
                required: true
                type: string
            bootstrap_mode:
                description: "safe keeps prevent_destroy, debug enables account closing on destroy"
                required: true
                type: choice
                options:
                    - safe
                    - debug
                default: safe
            debug_suffix:
                description: "Optional suffix for debug runs, e.g. dbg01"
                required: false
                type: string
                default: ""
            debug_confirmation:
                description: "Set YES to allow debug mode"
                required: false
                type: string
                default: "NO"
            preset:
                description: "Bootstrap preset from config/presets.json"
                required: true
                type: choice
                options:
                    - minimal
                    - dev-lite
                    - dev-standard
                    - release
                    - full-qa
                default: dev-standard
            action:
                description: "Run plan only or plan+apply"
                required: true
                type: choice
                options:
                    - plan
                    - apply
                default: apply
            aws_region:
                description: "Optional region override (defaults to AWS_REGION variable)"
                required: false
                type: string
                default: ""

permissions:
    id-token: write
    contents: read

jobs:
    bootstrap-org:
        runs-on: ubuntu-latest
        # Job outputs form a machine-readable contract for downstream automation.
        outputs:
            preset: ${{ steps.tfvars.outputs.preset }}
            accounts_json: ${{ steps.tfvars.outputs.accounts_json }}
            repo_branches_json: ${{ steps.tfvars.outputs.repo_branches_json }}
            default_branch: ${{ steps.tfvars.outputs.default_branch }}
            enable_preview_pr: ${{ steps.tfvars.outputs.enable_preview_pr }}
            account_ids_json: ${{ steps.tfout.outputs.account_ids_json }}
            account_arns_json: ${{ steps.tfout.outputs.account_arns_json }}
            account_emails_json: ${{ steps.tfout.outputs.account_emails_json }}
            ou_id: ${{ steps.tfout.outputs.ou_id }}
            ou_arn: ${{ steps.tfout.outputs.ou_arn }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Resolve workflow configuration
              id: cfg
              shell: bash
              env:
                  INPUT_AWS_REGION: ${{ inputs.aws_region }}
                  INPUT_BOOTSTRAP_MODE: ${{ inputs.bootstrap_mode }}
                  INPUT_DEBUG_CONFIRMATION: ${{ inputs.debug_confirmation }}
                  VAR_AWS_REGION: ${{ vars.AWS_REGION }}
                  VAR_AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
                  VAR_BOOTSTRAP_ROLE_NAME: ${{ vars.BOOTSTRAP_ROLE_NAME }}
                  VAR_AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}
                  VAR_TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
                  VAR_TF_LOCK_TABLE: ${{ vars.TF_LOCK_TABLE }}
                  VAR_TF_STATE_KEY_PREFIX: ${{ vars.TF_STATE_KEY_PREFIX }}
              run: |
                  set -euo pipefail

                  if [[ "${INPUT_BOOTSTRAP_MODE}" == "debug" && "${INPUT_DEBUG_CONFIRMATION}" != "YES" ]]; then
                    echo "::error::debug mode requires debug_confirmation=YES."
                    exit 1
                  fi

                  AWS_REGION="${INPUT_AWS_REGION:-$VAR_AWS_REGION}"
                  if [[ -z "${AWS_REGION}" ]]; then
                    echo "::error::AWS region is missing. Set workflow input aws_region or repository/org variable AWS_REGION."
                    exit 1
                  fi

                  if [[ -z "${VAR_TF_STATE_BUCKET}" ]]; then
                    echo "::error::Missing variable TF_STATE_BUCKET."
                    exit 1
                  fi

                  if [[ -z "${VAR_TF_LOCK_TABLE}" ]]; then
                    echo "::error::Missing variable TF_LOCK_TABLE."
                    exit 1
                  fi

                  if [[ -n "${VAR_AWS_ROLE_TO_ASSUME}" ]]; then
                    ROLE_ARN="${VAR_AWS_ROLE_TO_ASSUME}"
                  else
                    if [[ -z "${VAR_AWS_ACCOUNT_ID}" || -z "${VAR_BOOTSTRAP_ROLE_NAME}" ]]; then
                      echo "::error::Set AWS_ROLE_TO_ASSUME or both AWS_ACCOUNT_ID and BOOTSTRAP_ROLE_NAME."
                      exit 1
                    fi
                    ROLE_ARN="arn:aws:iam::${VAR_AWS_ACCOUNT_ID}:role/${VAR_BOOTSTRAP_ROLE_NAME}"
                  fi

                  STATE_PREFIX="${VAR_TF_STATE_KEY_PREFIX:-bootstrap-org}"
                  STATE_PREFIX="${STATE_PREFIX#/}"
                  STATE_PREFIX="${STATE_PREFIX%/}"
                  STATE_KEY="${STATE_PREFIX}/${{ inputs.app_slug }}.tfstate"

                  echo "aws_region=${AWS_REGION}" >> "$GITHUB_OUTPUT"
                  echo "role_arn=${ROLE_ARN}" >> "$GITHUB_OUTPUT"
                  echo "tf_state_bucket=${VAR_TF_STATE_BUCKET}" >> "$GITHUB_OUTPUT"
                  echo "tf_lock_table=${VAR_TF_LOCK_TABLE}" >> "$GITHUB_OUTPUT"
                  echo "state_key=${STATE_KEY}" >> "$GITHUB_OUTPUT"

            - name: Configure AWS credentials (OIDC)
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  role-to-assume: ${{ steps.cfg.outputs.role_arn }}
                  aws-region: ${{ steps.cfg.outputs.aws_region }}

            - name: Preflight backend resources
              shell: bash
              env:
                  AWS_REGION: ${{ steps.cfg.outputs.aws_region }}
                  TF_STATE_BUCKET: ${{ steps.cfg.outputs.tf_state_bucket }}
                  TF_LOCK_TABLE: ${{ steps.cfg.outputs.tf_lock_table }}
              run: |
                  set -euo pipefail

                  if ! aws s3api head-bucket --bucket "$TF_STATE_BUCKET" 2>/dev/null; then
                    echo "::error::S3 backend bucket '$TF_STATE_BUCKET' does not exist or is not accessible."
                    exit 1
                  fi

                  if ! aws dynamodb describe-table --table-name "$TF_LOCK_TABLE" --region "$AWS_REGION" >/dev/null 2>&1; then
                    echo "::error::DynamoDB lock table '$TF_LOCK_TABLE' does not exist or is not accessible."
                    exit 1
                  fi

            - name: Setup Terraform
              uses: hashicorp/setup-terraform@v3

            - name: Validate preset contract
              shell: bash
              run: |
                  set -euo pipefail
                  python scripts/validate-presets.py

            - name: Build runtime tfvars
              id: tfvars
              shell: bash
              env:
                  PRESET: ${{ inputs.preset }}
                  APP_SLUG: ${{ inputs.app_slug }}
                  ROOT_EMAIL_BASE: ${{ inputs.root_email_base }}
                  BOOTSTRAP_MODE: ${{ inputs.bootstrap_mode }}
                  DEBUG_SUFFIX: ${{ inputs.debug_suffix }}
                  AWS_REGION: ${{ steps.cfg.outputs.aws_region }}
              run: |
                  set -euo pipefail

                  # Resolve the selected preset into Terraform inputs and repo metadata.
                  PRESETS_FILE="config/presets.json"

                  if [[ ! -f "$PRESETS_FILE" ]]; then
                    echo "::error::Missing $PRESETS_FILE."
                    exit 1
                  fi

                  if ! jq -e --arg preset "$PRESET" '.presets[$preset]' "$PRESETS_FILE" >/dev/null; then
                    echo "::error::Unknown preset '$PRESET'."
                    exit 1
                  fi

                  ACCOUNTS_HCL="$(jq -c --arg preset "$PRESET" '.presets[$preset].aws_accounts' "$PRESETS_FILE")"
                  BRANCHES_JSON="$(jq -c --arg preset "$PRESET" '.presets[$preset].repo_branches' "$PRESETS_FILE")"
                  DEFAULT_BRANCH="$(jq -r --arg preset "$PRESET" '.presets[$preset].default_branch' "$PRESETS_FILE")"
                  ENABLE_PREVIEW_PR="$(jq -r --arg preset "$PRESET" '.presets[$preset].enable_preview_pr' "$PRESETS_FILE")"

                  TFVARS_PATH="$RUNNER_TEMP/bootstrap-org.tfvars"
                  cat > "$TFVARS_PATH" <<EOF
                  app_slug             = "${APP_SLUG}"
                  root_email_base      = "${ROOT_EMAIL_BASE}"
                  aws_region           = "${AWS_REGION}"
                  bootstrap_mode       = "${BOOTSTRAP_MODE}"
                  debug_suffix         = "${DEBUG_SUFFIX}"
                  environment_accounts = ${ACCOUNTS_HCL}

                  tags = {
                    ManagedBy = "GitHubActions"
                  }
                  EOF

                  echo "tfvars_path=${TFVARS_PATH}" >> "$GITHUB_OUTPUT"
                  echo "accounts_hcl=${ACCOUNTS_HCL}" >> "$GITHUB_OUTPUT"
                  echo "accounts_json=${ACCOUNTS_HCL}" >> "$GITHUB_OUTPUT"
                  echo "repo_branches_json=${BRANCHES_JSON}" >> "$GITHUB_OUTPUT"
                  echo "default_branch=${DEFAULT_BRANCH}" >> "$GITHUB_OUTPUT"
                  echo "enable_preview_pr=${ENABLE_PREVIEW_PR}" >> "$GITHUB_OUTPUT"
                  echo "preset=${PRESET}" >> "$GITHUB_OUTPUT"

            - name: Print destroy helper command
              shell: bash
              env:
                  APP_SLUG: ${{ inputs.app_slug }}
                  ROOT_EMAIL_BASE: ${{ inputs.root_email_base }}
                  BOOTSTRAP_MODE: ${{ inputs.bootstrap_mode }}
                  DEBUG_SUFFIX: ${{ inputs.debug_suffix }}
                  AWS_REGION: ${{ steps.cfg.outputs.aws_region }}
                  TF_STATE_BUCKET: ${{ steps.cfg.outputs.tf_state_bucket }}
                  TF_LOCK_TABLE: ${{ steps.cfg.outputs.tf_lock_table }}
                  STATE_KEY: ${{ steps.cfg.outputs.state_key }}
                  ACCOUNTS_HCL: ${{ steps.tfvars.outputs.accounts_hcl }}
              run: |
                  set -euo pipefail

                  echo "Destroy helper command (manual):"
                  echo "terraform -chdir=terraform/bootstrap-org init \\"
                  echo "  -backend-config=\"bucket=${TF_STATE_BUCKET}\" \\"
                  echo "  -backend-config=\"key=${STATE_KEY}\" \\"
                  echo "  -backend-config=\"region=${AWS_REGION}\" \\"
                  echo "  -backend-config=\"dynamodb_table=${TF_LOCK_TABLE}\" \\"
                  echo "  -backend-config=\"encrypt=true\" \\"
                  echo "  -reconfigure"
                  echo
                  echo "terraform -chdir=terraform/bootstrap-org destroy \\"
                  echo "  -var \"app_slug=${APP_SLUG}\" \\"
                  echo "  -var \"root_email_base=${ROOT_EMAIL_BASE}\" \\"
                  echo "  -var \"aws_region=${AWS_REGION}\" \\"
                  echo "  -var \"bootstrap_mode=${BOOTSTRAP_MODE}\" \\"
                  echo "  -var \"debug_suffix=${DEBUG_SUFFIX}\" \\"
                  echo "  -var 'environment_accounts=${ACCOUNTS_HCL}'"
                  echo
                  echo "Note: Account closure is asynchronous. In debug mode, destroy may timeout while waiting for final account deletion."

            - name: Terraform init
              shell: bash
              env:
                  AWS_REGION: ${{ steps.cfg.outputs.aws_region }}
                  TF_STATE_BUCKET: ${{ steps.cfg.outputs.tf_state_bucket }}
                  TF_LOCK_TABLE: ${{ steps.cfg.outputs.tf_lock_table }}
                  STATE_KEY: ${{ steps.cfg.outputs.state_key }}
              run: |
                  set -euo pipefail
                  terraform -chdir=terraform/bootstrap-org init \
                    -backend-config="bucket=${TF_STATE_BUCKET}" \
                    -backend-config="key=${STATE_KEY}" \
                    -backend-config="region=${AWS_REGION}" \
                    -backend-config="dynamodb_table=${TF_LOCK_TABLE}" \
                    -backend-config="encrypt=true" \
                    -reconfigure

            - name: Terraform plan
              shell: bash
              env:
                  TFVARS_PATH: ${{ steps.tfvars.outputs.tfvars_path }}
              run: |
                  set -euo pipefail
                  terraform -chdir=terraform/bootstrap-org plan \
                    -var-file="${TFVARS_PATH}" \
                    -out="$RUNNER_TEMP/bootstrap-org.tfplan"

            - name: Terraform apply
              if: ${{ inputs.action == 'apply' }}
              shell: bash
              run: |
                  set -euo pipefail
                  terraform -chdir=terraform/bootstrap-org apply -auto-approve "$RUNNER_TEMP/bootstrap-org.tfplan"

            - name: Terraform outputs (human-readable)
              if: ${{ inputs.action == 'apply' }}
              shell: bash
              run: |
                  set -euo pipefail
                  terraform -chdir=terraform/bootstrap-org output

            - name: Terraform outputs (JSON)
              if: ${{ inputs.action == 'apply' }}
              id: tfout
              shell: bash
              run: |
                  set -euo pipefail

                  # Read structured outputs from state and expose them via GITHUB_OUTPUT.
                  ACCOUNT_IDS_JSON="$(terraform -chdir=terraform/bootstrap-org output -json account_ids | jq -c .)"
                  ACCOUNT_ARNS_JSON="$(terraform -chdir=terraform/bootstrap-org output -json account_arns | jq -c .)"
                  ACCOUNT_EMAILS_JSON="$(terraform -chdir=terraform/bootstrap-org output -json account_emails | jq -c .)"
                  OU_ID="$(terraform -chdir=terraform/bootstrap-org output -raw ou_id)"
                  OU_ARN="$(terraform -chdir=terraform/bootstrap-org output -raw ou_arn)"

                  echo "account_ids_json=${ACCOUNT_IDS_JSON}" >> "$GITHUB_OUTPUT"
                  echo "account_arns_json=${ACCOUNT_ARNS_JSON}" >> "$GITHUB_OUTPUT"
                  echo "account_emails_json=${ACCOUNT_EMAILS_JSON}" >> "$GITHUB_OUTPUT"
                  echo "ou_id=${OU_ID}" >> "$GITHUB_OUTPUT"
                  echo "ou_arn=${OU_ARN}" >> "$GITHUB_OUTPUT"

            - name: Print standardized JSON payload
              if: ${{ inputs.action == 'apply' }}
              shell: bash
              env:
                  PRESET: ${{ steps.tfvars.outputs.preset }}
                  ACCOUNT_IDS_JSON: ${{ steps.tfout.outputs.account_ids_json }}
                  ACCOUNT_ARNS_JSON: ${{ steps.tfout.outputs.account_arns_json }}
                  ACCOUNT_EMAILS_JSON: ${{ steps.tfout.outputs.account_emails_json }}
                  OU_ID: ${{ steps.tfout.outputs.ou_id }}
                  OU_ARN: ${{ steps.tfout.outputs.ou_arn }}
              run: |
                  set -euo pipefail

                  # Emit one normalized JSON document for logs/debugging and future parsers.
                  jq -n \
                    --arg preset "$PRESET" \
                    --arg ou_id "$OU_ID" \
                    --arg ou_arn "$OU_ARN" \
                    --argjson account_ids "$ACCOUNT_IDS_JSON" \
                    --argjson account_arns "$ACCOUNT_ARNS_JSON" \
                    --argjson account_emails "$ACCOUNT_EMAILS_JSON" \
                    '{
                      preset: $preset,
                      ou: { id: $ou_id, arn: $ou_arn },
                      accounts: {
                        ids: $account_ids,
                        arns: $account_arns,
                        emails: $account_emails
                      }
                    }'
